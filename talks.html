  .sb-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;opacity:.5}
  .sb-inner{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;
    padding:34px 28px;background:linear-gradient(to bottom,rgba(16,24,32,.35),rgba(16,24,32,.86) 60%,rgba(16,24,32,.95))}
  .sb-name{font-size:27px;line-height:1.05;font-weight:600;letter-spacing:-.01em;margin:0}
  .sb-name a{color:var(--paper);text-decoration:none}
  .sb-role{margin:12px 0 0;font-size:14px;color:rgba(243,239,230,.78);line-height:1.4}
  .sb-role b{color:var(--wave-crest);font-weight:600}
  .sb-sec{margin-top:26px}
  .sb-h{font-family:"SF Mono",ui-monospace,monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--signal-2);margin:0 0 10px;font-weight:600}
  .sb-nav a{display:block;color:rgba(243,239,230,.9);text-decoration:none;font-size:16px;padding:5px 0;border-bottom:1px solid rgba(243,239,230,.08);transition:color .12s,padding-left .12s}
  .sb-nav a:hover{color:var(--signal-2);padding-left:5px}
  .sb-nav a.active{color:var(--wave-crest)}
  .sb-social{display:flex;flex-wrap:wrap;gap:8px}
  .sb-social a{font-family:"SF Mono",ui-monospace,monospace;font-size:12px;color:rgba(243,239,230,.85);text-decoration:none;border:1px solid rgba(243,239,230,.18);border-radius:999px;padding:5px 11px;transition:border-color .12s,color .12s}
  .sb-social a:hover{border-color:var(--signal-2);color:var(--signal-2)}
  .sb-foot{margin-top:auto;padding-top:22px;font-size:11px;color:rgba(243,239,230,.4);font-family:"SF Mono",ui-monospace,monospace}
  .main{flex:1;min-width:0;display:flex;justify-content:center}
  .col{width:100%;max-width:var(--maxw);padding:56px 34px 90px}
  h1.page{font-size:clamp(28px,4vw,40px);line-height:1.05;margin:0 0 8px;font-weight:600;letter-spacing:-.01em}
  .note{color:var(--mut);font-size:15px;margin:0 0 28px}
  .talk{margin:0 0 24px;padding:0 0 24px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:96px 1fr;gap:18px}
  .talk:last-child{border-bottom:none}
  .talk .yr{font-family:"SF Mono",ui-monospace,monospace;font-size:14px;color:var(--signal);font-weight:600;padding-top:2px}
  .talk .tt{font-size:19px;font-weight:600;line-height:1.3}

<script>
"use strict";
const reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function phaseColor(p){const t=(p+Math.PI)/(2*Math.PI);const s=[[29,59,92],[63,115,166],[205,191,154],[63,115,166],[29,59,92]];const seg=t*(s.length-1),i=Math.floor(seg),f=seg-i,a=s[i],b=s[Math.min(i+1,s.length-1)];return `rgb(${Math.round(a[0]+(b[0]-a[0])*f)},${Math.round(a[1]+(b[1]-a[1])*f)},${Math.round(a[2]+(b[2]-a[2])*f)})`;}
function fitCanvas(c,cssH){const dpr=Math.min(window.devicePixelRatio||1,2),w=c.clientWidth||300,hh=cssH||c.clientHeight||300;c.width=w*dpr;c.height=hh*dpr;const ctx=c.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);return {ctx,w,h:hh};}
(function(){const c=document.getElementById('sbCanvas');if(!c)return;let dim=fitCanvas(c,c.clientHeight||700);const ctx=dim.ctx;window.addEventListener('resize',()=>{dim=fitCanvas(c,c.clientHeight||700);});let t=0;function frame(){const W=dim.w,H=dim.h;ctx.clearRect(0,0,W,H);const cols=26,rows=80,cw=W/cols,ch=H/rows;for(let yi=0;yi<rows;yi++)for(let xi=0;xi<cols;xi++){const y=yi/rows;const ph=Math.sin(2*Math.PI*2*y-t*0.7+xi*0.18)+0.5*Math.sin(2*Math.PI*4*y+t*0.4);ctx.fillStyle=phaseColor(Math.atan2(Math.sin(ph),Math.cos(ph)));ctx.fillRect(xi*cw,yi*ch,cw+1,ch+1);}if(!reduceMotion){t+=0.025;requestAnimationFrame(frame);}}frame();})();
</script>
